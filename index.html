<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Store</title>

<style>
:root{
    --accent:#2563eb;
    --dark:#0f172a;
    --light:#f8fafc;
    --border:#e2e8f0;
}

*{
    box-sizing:border-box;
}

body{
    font-family:system-ui,-apple-system,sans-serif;
    margin:0;
    background:var(--light);
    color:var(--dark);
}

header{
    background:#fff;
    padding:1rem 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:100;
}

.title{
    margin:0;
    color:var(--accent);
    font-size:1.6rem;
    font-weight:bold;
}

.search-bar{
    width:40%;
    padding:.8rem 1rem;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--light);
    outline:none;
}

.search-bar:focus{
    border-color:var(--accent);
}

.filters{
    display:flex;
    gap:10px;
    padding:20px;
    overflow-x:auto;
    justify-content:center;
}

.chip{
    border:1px solid var(--border);
    background:#fff;
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
    white-space:nowrap;
}

.chip.active{
    background:var(--dark);
    color:#fff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:20px;
    padding:0 5% 40px;
    max-width:1400px;
    margin:auto;
}

.card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:15px;
    transition:.2s;
    display:flex;
    flex-direction:column;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 15px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    height:220px;
    object-fit:contain;
    border-radius:10px;
    background:#fff;
}

.card h3{
    margin:10px 0 5px;
    font-size:1.05rem;
}

.card p{
    margin:0;
    font-size:.85rem;
    color:#64748b;
    flex-grow:1;
}

.price-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.btn-add{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn-add:hover{
    background:#1d4ed8;
}

.cart-toggle-btn{
    border:none;
    background:none;
    cursor:pointer;
    font-size:1.2rem;
    display:flex;
    align-items:center;
    gap:5px;
}

.cart-badge{
    background:var(--accent);
    color:#fff;
    border-radius:12px;
    padding:2px 8px;
    font-size:.85rem;
    font-weight:bold;
}

#cart-panel{
    position:fixed;
    right:-380px;
    top:0;
    width:350px;
    height:100%;
    background:#fff;
    box-shadow:-5px 0 15px rgba(0,0,0,.1);
    transition:.3s;
    z-index:300;
    padding:20px;
    display:flex;
    flex-direction:column;
}

#cart-panel.open{
    right:0;
}

.cart-items{
    flex-grow:1;
    overflow-y:auto;
    margin:20px 0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:12px;
    margin-bottom:12px;
    border-bottom:1px solid var(--border);
}

.cart-btn{
    background:var(--dark);
    color:#fff;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.empty-state{
    text-align:center;
    color:#64748b;
    grid-column:1/-1;
    padding:40px;
}

@media(max-width:600px){

    header{
        flex-direction:column;
        gap:15px;
    }

    .search-bar{
        width:100%;
    }

    #cart-panel{
        width:100%;
        right:-100%;
    }
}
</style>
</head>

<body>

<header>

<h1 class="title">Mobile Store</h1>

<input
type="text"
id="searchInput"
class="search-bar"
placeholder="Buscar por modelo o marca..."
>

<button id="cartToggleBtn" class="cart-toggle-btn">
🛒
<span id="cart-counter" class="cart-badge">0</span>
</button>

</header>

<div class="filters" id="brand-filters"></div>

<main class="grid" id="main-grid"></main>

<div id="cart-panel">

<h2>Tu carrito</h2>

<div class="cart-items" id="cart-list">
<p style="text-align:center;color:#64748b;">
El carrito está vacío
</p>
</div>

<div style="border-top:1px solid var(--border);padding-top:15px;">

<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
<span>Subtotal</span>
<span id="cart-subtotal">$0.00</span>
</div>

<div style="display:flex;justify-content:space-between;margin-bottom:15px;font-size:1.1rem;">
<strong>Total + IVA</strong>
<strong id="cart-total" style="color:var(--accent);">$0.00</strong>
</div>

<button class="cart-btn" id="checkoutBtn">
Finalizar Compra
</button>

<button
id="closeCartBtn"
style="margin-top:10px;border:none;background:none;color:#ef4444;cursor:pointer;"
>
Cerrar
</button>

</div>

</div>

];
let cart = [];
let currentBrand = 'Todos';
let searchTerm = '';

document.addEventListener('DOMContentLoaded',()=>{

const brands = [
'Todos',
...new Set(products.map(p=>p.brand))
];

const filterContainer =
document.getElementById('brand-filters');

brands.forEach(b=>{

const btn = document.createElement('button');

btn.className =
`chip ${b===currentBrand?'active':''}`;

btn.textContent = b;

btn.addEventListener('click',(e)=>{

currentBrand = b;

document
.querySelectorAll('.chip')
.forEach(c=>c.classList.remove('active'));

e.target.classList.add('active');

applyFilters();

});

filterContainer.appendChild(btn);

});

document
.getElementById('searchInput')
.addEventListener('input',(e)=>{

searchTerm =
e.target.value.toLowerCase();

applyFilters();

});

document
.getElementById('cartToggleBtn')
.addEventListener('click',toggleCart);

document
.getElementById('closeCartBtn')
.addEventListener('click',toggleCart);

document
.getElementById('checkoutBtn')
.addEventListener('click',checkout);

applyFilters();

});

function applyFilters(){

const filtered = products.filter(p=>{

const matchesBrand =
currentBrand==='Todos'
|| p.brand===currentBrand;

const matchesSearch =
p.model.toLowerCase().includes(searchTerm)
|| p.brand.toLowerCase().includes(searchTerm);

return matchesBrand && matchesSearch;

});

renderGrid(filtered);

}

function renderGrid(data){

const grid =
document.getElementById('main-grid');

grid.innerHTML = '';

if(data.length===0){

grid.innerHTML = `
<div class="empty-state">
<h3>No se encontraron productos</h3>
</div>
`;

return;

}

data.forEach(p=>{

const card =
document.createElement('div');

card.className = 'card';

card.innerHTML = `

<img src="${p.img}" alt="${p.model}" loading="lazy">

<span style="
font-size:.75rem;
font-weight:bold;
color:var(--accent);
text-transform:uppercase;
margin-top:10px;
">
${p.brand}
</span>

<h3>${p.model}</h3>

<p>Categoría: ${p.cat}</p>

<div class="price-row">

<span style="
font-weight:bold;
font-size:1.2rem;
">
$${p.price}
</span>

<button class="btn-add" data-id="${p.id}">
Añadir
</button>

</div>
`;

grid.appendChild(card);

});

document
.querySelectorAll('.btn-add')
.forEach(btn=>{

btn.addEventListener('click',(e)=>{

addToCart(
parseInt(
e.target.getAttribute('data-id')
)
);

});

});

}

function addToCart(id){

const item =
products.find(p=>p.id===id);

if(item){

cart.push(item);

updateCartUI();

}

}

function updateCartUI(){

document.getElementById('cart-counter')
.innerText = cart.length;

const list =
document.getElementById('cart-list');

list.innerHTML = '';

if(cart.length===0){

list.innerHTML = `
<p style="text-align:center;color:#64748b;">
El carrito está vacío
</p>
`;

document.getElementById('cart-subtotal')
.innerText = '$0.00';

document.getElementById('cart-total')
.innerText = '$0.00';

return;

}

cart.forEach((item,index)=>{

const div =
document.createElement('div');

div.className = 'cart-item';

div.innerHTML = `

<div>

<strong>${item.model}</strong>

<div style="
font-size:.8rem;
color:#64748b;
">
${item.brand}
</div>

</div>

<div style="
display:flex;
align-items:center;
gap:10px;
">

<span>$${item.price}</span>

<button
class="remove-btn"
data-index="${index}"
style="
border:none;
background:#fee2e2;
color:#ef4444;
width:24px;
height:24px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
"
>
×
</button>

</div>
`;

list.appendChild(div);

});

document
.querySelectorAll('.remove-btn')
.forEach(btn=>{

btn.addEventListener('click',(e)=>{

removeFromCart(
parseInt(
e.target.getAttribute('data-index')
)
);

});

});

const subtotal =
cart.reduce(
(acc,item)=>acc+item.price,
0
);

document.getElementById('cart-subtotal')
.innerText =
`$${subtotal.toFixed(2)}`;

document.getElementById('cart-total')
.innerText =
`$${(subtotal*1.16).toFixed(2)}`;

}

function removeFromCart(index){

cart.splice(index,1);

updateCartUI();

}

function toggleCart(){

document
.getElementById('cart-panel')
.classList.toggle('open');

}

function checkout(){

if(cart.length===0){

alert(
'El carrito está vacío.'
);

return;

}

alert(
'¡Pedido realizado con éxito!'
);

cart = [];

updateCartUI();

toggleCart();

}
