<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Store</title>
    <style>
        :root {
            --accent: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--light);
            color: var(--dark);
        }

        header {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .title {
            margin: 0;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .search-bar {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            width: 40%;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            overflow-x: auto;
        }

        .chip {
            border: 1px solid var(--border);
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--dark);
        }

        .chip.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            padding: 0 5% 40px;
            max-width: 1400px;
            margin: auto;
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card h3 { 
            margin: 10px 0 5px; 
            font-size: 1.1rem; 
        }

        .card p { 
            font-size: 0.85rem; 
            color: #64748b; 
            flex-grow: 1; 
            margin: 0; 
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #1d4ed8;
        }

        #cart-panel {
            position: fixed;
            right: -380px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 200;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #cart-panel.open { right: 0; }

        .cart-items { 
            flex-grow: 1; 
            overflow-y: auto; 
            margin: 20px 0; 
            padding-right: 10px; 
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cart-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-btn:hover { background: #1e293b; }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .cart-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cart-badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            .search-bar {
                width: 100%;
            }
            #cart-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="title">Mobile Store</div>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar por modelo o marca...">
    <button id="cartToggleBtn" class="cart-toggle-btn">
        🛒 <span id="cart-counter" class="cart-badge">0</span>
    </button>
</header>

<div class="filters" id="brand-filters"></div>

<main class="grid" id="main-grid"></main>

<div id="cart-panel">
    <h3 style="margin-top: 0;">Tu Carrito</h3>
    <div class="cart-items" id="cart-list">
        <p style="text-align:center; color:#64748b; margin-top: 50%;">El carrito está vacío</p>
    </div>
    <div style="border-top: 1px solid var(--border); padding-top: 15px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 0.9rem;">
            <span>Subtotal:</span>
            <span id="cart-subtotal">$0.00</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size: 1.1rem;">
            <strong>Total (+IVA 16%):</strong>
            <strong id="cart-total" style="color: var(--accent);">$0.00</strong>
        </div>
        <button class="cart-btn" id="checkoutBtn">Finalizar Compra</button>
        <button id="closeCartBtn" style="border:none; background:none; width:100%; margin-top:10px; cursor:pointer; color:#ef4444; padding: 8px;">Cerrar Panel</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, brand: 'Apple', model: 'iPhone 15 Pro Max', price: 1199, cat: 'High', img: 'https://images.unsplash.com/photo-1696446701796-da61225697cc?q=80&w=400&auto=format&fit=crop' },
        { id: 2, brand: 'Apple', model: 'iPhone 15 Pro', price: 999, cat: 'High', img: 'https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=400&auto=format&fit=crop' },
        { id: 3, brand: 'Apple', model: 'iPhone 15', price: 799, cat: 'High', img: 'https://images.unsplash.com/photo-1616348436168-de43ad0db179?q=80&w=400&auto=format&fit=crop' },
        { id: 4, brand: 'Apple', model: 'iPhone 14', price: 699, cat: 'Mid', img: 'https://images.unsplash.com/photo-1601784551446-20c9e096b31a?q=80&w=400&auto=format&fit=crop' },
        { id: 5, brand: 'Samsung', model: 'Galaxy S24 Ultra', price: 1299, cat: 'High', img: 'https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=400&auto=format&fit=crop' },
        { id: 6, brand: 'Samsung', model: 'Galaxy S24', price: 799, cat: 'High', img: 'https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?q=80&w=400&auto=format&fit=crop' },
        { id: 7, brand: 'Samsung', model: 'Galaxy Z Fold 5', price: 1799, cat: 'Fold', img: 'https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?q=80&w=400&auto=format&fit=crop' },
        { id: 8, brand: 'Samsung', model: 'Galaxy Z Flip 5', price: 999, cat: 'Fold', img: 'https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?q=80&w=400&auto=format&fit=crop' },
        { id: 9, brand: 'Samsung', model: 'Galaxy A54', price: 449, cat: 'Mid', img: 'https://images.unsplash.com/photo-1678911820864-e2c567c655d7?q=80&w=400&auto=format&fit=crop' },
        { id: 10, brand: 'Google', model: 'Pixel 8 Pro', price: 999, cat: 'High', img: 'https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?q=80&w=400&auto=format&fit=crop' },
        { id: 11, brand: 'Google', model: 'Pixel 8', price: 699, cat: 'High', img: 'https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?q=80&w=400&auto=format&fit=crop' },
        { id: 12, brand: 'Google', model: 'Pixel 7a', price: 499, cat: 'Mid', img: 'https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?q=80&w=400&auto=format&fit=crop' },
        { id: 13, brand: 'Xiaomi', model: '14 Ultra', price: 1099, cat: 'High', img: 'https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=400&auto=format&fit=crop' },
        { id: 14, brand: 'Xiaomi', model: 'Redmi Note 13 Pro', price: 349, cat: 'Mid', img: 'https://images.unsplash.com/photo-1598327105666-5b89351aff97?q=80&w=400&auto=format&fit=crop' },
        { id: 15, brand: 'Poco', model: 'X6 Pro', price: 349, cat: 'Mid', img: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=400&auto=format&fit=crop' },
        { id: 16, brand: 'Motorola', model: 'Razr 40 Ultra', price: 899, cat: 'Fold', img: 'https://images.unsplash.com/photo-1678911820864-e2c567c655d7?q=80&w=400&auto=format&fit=crop' },
        { id: 17, brand: 'Motorola', model: 'Edge 40 Neo', price: 399, cat: 'Mid', img: 'https://images.unsplash.com/photo-1601784551446-20c9e096b31a?q=80&w=400&auto=format&fit=crop' },
        { id: 18, brand: 'Nothing', model: 'Phone (2)', price: 649, cat: 'Mid', img: 'https://images.unsplash.com/photo-1691443427218-971775f0a07e?q=80&w=400&auto=format&fit=crop' },
        { id: 19, brand: 'Asus', model: 'Zenfone 10', price: 699, cat: 'High', img: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=400&auto=format&fit=crop' },
        { id: 20, brand: 'Sony', model: 'Xperia 5 V', price: 899, cat: 'High', img: 'https://images.unsplash.com/photo-1523206489230-c012c64b2b48?q=80&w=400&auto=format&fit=crop' },
        { id: 21, brand: 'OnePlus', model: '12', price: 799, cat: 'High', img: 'https://images.unsplash.com/photo-1601784551446-20c9e096b31a?q=80&w=400&auto=format&fit=crop' },
        { id: 22, brand: 'OnePlus', model: 'Nord 3', price: 449, cat: 'Mid', img: 'https://images.unsplash.com/photo-1601784551446-20c9e096b31a?q=80&w=400&auto=format&fit=crop' },
        { id: 23, brand: 'Huawei', model: 'P60 Pro', price: 899, cat: 'High', img: 'https://images.unsplash.com/photo-1601784551446-20c9e096b31a?q=80&w=400&auto=format&fit=crop' },
        { id: 24, brand: 'Honor', model: 'Magic 5 Pro', price: 949, cat: 'High', img: 'https://images.unsplash.com/photo-1601784551446-20c9e096b31a?q=80&w=400&auto=format&fit=crop' }
    ];

    let cart = [];
    let currentBrand = 'Todos';
    let searchTerm = '';

    document.addEventListener('DOMContentLoaded', () => {
        const brands = ['Todos', ...new Set(products.map(p => p.brand))];
        const filterContainer = document.getElementById('brand-filters');
        
        brands.forEach(b => {
            const btn = document.createElement('button');
            btn.className = `chip ${b === currentBrand ? 'active' : ''}`;
            btn.textContent = b;
            btn.addEventListener('click', (e) => {
                currentBrand = b;
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                applyFilters();
            });
            filterContainer.appendChild(btn);
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            applyFilters();
        });

        document.getElementById('cartToggleBtn').addEventListener('click', toggleCart);
        document.getElementById('closeCartBtn').addEventListener('click', toggleCart);
        document.getElementById('checkoutBtn').addEventListener('click', checkout);

        applyFilters();
    });

    function applyFilters() {
        const filtered = products.filter(p => {
            const matchesBrand = currentBrand === 'Todos' || p.brand === currentBrand;
            const matchesSearch = p.model.toLowerCase().includes(searchTerm) || p.brand.toLowerCase().includes(searchTerm);
            return matchesBrand && matchesSearch;
        });
        renderGrid(filtered);
    }

    function renderGrid(data) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        
        if (data.length === 0) {
            grid.innerHTML = `<div class="empty-state"><h3>No se encontraron productos</h3></div>`;
            return;
        }

        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${p.img}" alt="${p.model}" loading="lazy">
                <span style="font-size:0.75rem; color:var(--accent); font-weight:bold; text-transform: uppercase;">${p.brand}</span>
                <h3>${p.model}</h3>
                <p>Categoría: ${p.cat}</p>
                <div class="price-row">
                    <span style="font-weight:bold; font-size: 1.2rem;">$${p.price}</span>
                    <button class="btn-add" data-id="${p.id}">Añadir</button>
                </div>
            `;
            grid.appendChild(card);
        });

        document.querySelectorAll('.btn-add').forEach(btn => {
            btn.addEventListener('click', (e) => {
                addToCart(parseInt(e.target.getAttribute('data-id')));
            });
        });
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        if (item) {
            cart.push(item);
            updateCartUI();
            const panel = document.getElementById('cart-panel');
            if (!panel.classList.contains('open')) {
                toggleCart();
                setTimeout(toggleCart, 1500);
            }
        }
    }

    function updateCartUI() {
        document.getElementById('cart-counter').innerText = cart.length;
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        
        if (cart.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:#64748b; margin-top: 50%;">El carrito está vacío</p>`;
            document.getElementById('cart-subtotal').innerText = `$0.00`;
            document.getElementById('cart-total').innerText = `$0.00`;
            return;
        }

        cart.forEach((item, index) => {
            const cartItem = document.createElement('div');
            cartItem.className = 'cart-item';
            cartItem.innerHTML = `
                <div class="cart-item-info">
                    <strong>${item.model}</strong>
                    <span style="font-size: 0.8rem; color: #64748b;">${item.brand}</span>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span>$${item.price}</span>
                    <button class="remove-btn" data-index="${index}" style="border:none; background:#fee2e2; color:#ef4444; border-radius:4px; cursor:pointer; width: 24px; height: 24px; display:flex; align-items:center; justify-content:center; font-weight:bold;">×</button>
                </div>
            `;
            list.appendChild(cartItem);
        });

        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                removeFromCart(parseInt(e.target.getAttribute('data-index')));
            });
        });

        const subtotal = cart.reduce((acc, item) => acc + item.price, 0);
        document.getElementById('cart-subtotal').innerText = `$${subtotal.toFixed(2)}`;
        document.getElementById('cart-total').innerText = `$${(subtotal * 1.16).toFixed(2)}`;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    function toggleCart() {
        document.getElementById('cart-panel').classList.toggle('open');
    }

    function checkout() {
        if (cart.length === 0) {
            alert("El carrito está vacío. Agrega productos antes de finalizar.");
            return;
        }
        alert("¡Pedido realizado con éxito! Gracias por su compra.");
        cart = [];
        updateCartUI();
        toggleCart();
    }
</script>
</body>
</html>
